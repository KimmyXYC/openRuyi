repos:
-   repo: local
    hooks:
    -  id: no-group-tag
       name: "check no Group tag"
       language: pygrep
       entry: '^Group:'
       files: \.spec$
    -  id: autorelease
       name: "check autorelease macro"
       language: pygrep
       entry: '^Release:.*(%autorelease|%{autorelease}).*$'
       args: ["--negate"]
       files: \.spec$
    -  id: autochangelog
       name: "check autochangelog macro"
       language: pygrep
       entry: '%changelog\s+%\{\?autochangelog\}'
       args: ["--negate", "--multiline"]
       files: \.spec$
    -  id: sourcewithRemoteAsset
       name: "check Source with #!RemoteAsset"
       language: python
       entry: scripts/pre-commit-hooks/check_source_with_remoteasset.py
       files: \.spec$
       pass_filenames: true
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
        files: \.spec$
    -   id: end-of-file-fixer
        files: \.spec$
    -   id: check-added-large-files
    -   id: check-merge-conflict
    -   id: check-case-conflict
    -   id: check-toml
    -   id: check-yaml
# TODO:
-   repo: https://github.com/fsfe/reuse-tool
    rev: v6.1.0
    hooks:
      - id: reuse
        name: Run reuse annotate
        pass_filenames: true
        files: \.spec$
        args: ["annotate", "--copyright-prefix", "spdx-c",
               "--merge-copyrights",
               "--style" ,"python",
               "-c" ,"openRuyi Project Contributors" ,
               "-c" ,"Institute of Software, Chinese Academy of Sciences (ISCAS)",
               -l, "MulanPSL-2.0" ]
